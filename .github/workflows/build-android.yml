# Release Android App Bundle on push to main.
# iOS: see build-ios.yml (manual / future signing setup).
name: Build Android

on:
  push:
    branches:
      - master

env:
  BUILD_NAME: "2.0.7"
  BUILD_NUMBER: ${{ 49 + github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build App Bundle
        run: |
          flutter build appbundle --release \
            --build-name="${{ env.BUILD_NAME }}" \
            --build-number="${{ env.BUILD_NUMBER }}"

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: madnews-android-${{ env.BUILD_NUMBER }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
