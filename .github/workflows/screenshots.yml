# App Store / Play Store screenshots (manual).
# Requires https://github.com/rtf6x/flutter-screenshot-runner
name: Screenshots

on:
  workflow_dispatch:

env:
  GAME_SLUG: mad-news

jobs:
  capture:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include: 
          - device: phone
            locale: en
          - device: phone
            locale: ru
          - device: tablet
            locale: en
          - device: tablet
            locale: ru
    steps:
      - name: Prepare workspace
        run: mkdir -p ws

      - name: Checkout game
        uses: actions/checkout@v5
        with:
          path: ws/${{ github.event.repository.name }}

      - name: Checkout screenshot_runner
        uses: actions/checkout@v5
        with:
          repository: rtf6x/flutter-screenshot-runner
          path: ws/screenshot_runner
          token: ${{ secrets.SCREENSHOT_RUNNER_PAT }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: ws/${{ github.event.repository.name }}
        run: flutter pub get

      - name: Install ffmpeg
        run: brew list ffmpeg &>/dev/null || brew install ffmpeg

      - name: Capture screenshots
        working-directory: ws/${{ github.event.repository.name }}
        env:
          SCREENSHOT_OUT_DIR: screenshots
        run: |
          chmod +x ../screenshot_runner/ci_capture.sh
          ../screenshot_runner/ci_capture.sh "${{ matrix.device }}" "${{ matrix.locale }}"

      - name: Upload screenshots
        uses: actions/upload-artifact@v6
        with:
          name: screenshots-${{ env.GAME_SLUG }}-${{ matrix.device }}-${{ matrix.locale }}
          path: ws/${{ github.event.repository.name }}/screenshots/
          retention-days: 30
          if-no-files-found: error
