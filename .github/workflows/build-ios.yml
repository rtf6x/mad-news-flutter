# iOS release build with Apple code signing via GitHub Secrets.
# Uses the same BUILD_NUMBER offset as build-android.yml for consistent versioning.
name: Build iOS

on:
  workflow_dispatch:

env:
  BUILD_NAME: "2.2.1"

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Xcode and iOS SDK
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Set build number
        run: echo "BUILD_NUMBER=$((49 + ${{ github.run_number }}))" >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Sync generator JSON
        run: dart run tool/export_generator_json.dart

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/build.mobileprovision"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision
          echo "PP_UUID=$PP_UUID" >> "$GITHUB_ENV"

      - name: Configure code signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          python3 <<'PY'
          import os
          import re

          path = "ios/Runner.xcodeproj/project.pbxproj"
          team = os.environ["APPLE_TEAM_ID"]
          profile = os.environ["PP_UUID"]

          with open(path, encoding="utf-8") as f:
              content = f.read()

          def patch_runner_block(block: str) -> str:
              if "PRODUCT_BUNDLE_IDENTIFIER = cc.rootfox.madnews;" not in block:
                  return block
              if "cc.rootfox.madnews.RunnerTests" in block:
                  return block

              block = block.replace("CODE_SIGN_STYLE = Automatic;", "CODE_SIGN_STYLE = Manual;")
              block = block.replace('DEVELOPMENT_TEAM = "";', f"DEVELOPMENT_TEAM = {team};")

              if "PROVISIONING_PROFILE_SPECIFIER" not in block:
                  team_line = f"DEVELOPMENT_TEAM = {team};"
                  signing_lines = (
                      f'{team_line}\n'
                      f'\t\t\t\t"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";\n'
                      f'\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";\n'
                      f'\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = {profile};'
                  )
                  block = block.replace(team_line, signing_lines, 1)

              return block

          content = re.sub(
              r"/\* (?:Debug|Release|Profile) \*/ = \{.*?name = (?:Debug|Release|Profile);\n\t\t\};",
              lambda m: patch_runner_block(m.group(0)),
              content,
              flags=re.DOTALL,
          )

          with open(path, "w", encoding="utf-8") as f:
              f.write(content)

          import plistlib

          export_options = {
              "method": "app-store",
              "signingStyle": "manual",
              "teamID": team,
              "uploadSymbols": True,
              "provisioningProfiles": {
                  "cc.rootfox.madnews": profile,
              },
          }
          with open("ios/ExportOptions.plist", "wb") as f:
              plistlib.dump(export_options, f)
          PY

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --build-name="${{ env.BUILD_NAME }}" \
            --build-number="${{ env.BUILD_NUMBER }}" \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: madnews-ios-${{ env.BUILD_NUMBER }}
          path: build/ios/ipa/*.ipa
          retention-days: 90
          if-no-files-found: error
